services:
  - type: web
    name: kyr-legal-assistant
    env: python
    plan: free
    buildCommand: pip install fastapi uvicorn python-multipart python-dotenv numpy google-generativeai gTTS SpeechRecognition scikit-learn
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LIGHTWEIGHT_MODE
        value: "true"
